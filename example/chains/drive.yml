chain:
  - plugin: NoiseGate
    params:
      threshold_db: -50

  - plugin: Distortion
    params:
      drive_db: 20

  - plugin: HighpassFilter
    params:
      cutoff_frequency_hz: 80

  - plugin: LowpassFilter
    params:
      cutoff_frequency_hz: 8000

  - plugin: Reverb
    params:
      room_size: 0.3
      wet_level: 0.15

  - plugin: Limiter
    params:
      threshold_db: -1.0
